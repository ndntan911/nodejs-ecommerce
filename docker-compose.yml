version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_ecomerce
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: shopDEV
    volumes:
      - mongodb_data:/data/db
    networks:
      - ecomerce_network

volumes:
  mongodb_data:

networks:
  ecomerce_network:
    driver: bridge